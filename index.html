<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LordA2117's writeups</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Docs in Dark Mode">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

	<!-- docsify-themeable -->
  <link rel="stylesheet" href="//unpkg.com/docsify-themeable/dist/css/theme-simple-dark.css">
	<link
		rel="stylesheet"
		media="(prefers-color-scheme: dark)"
		href="//cdn.jsdelivr.net/npm/prism-themes@1/themes/prism-one-dark.min.css"
	/>
	<!-- comments -->
	<link rel="stylesheet" href="https://unpkg.com/docsify-giscus@1.0.0/dist/giscus.css">
</head>
<body>
  <div id="app"></div>

  <script>

		function getGiscusTerm() {
			const hash = window.location.hash;

			if (!hash || hash === "#/" || hash === "") {
				return "home";
			}

			return hash.replace("#/", "").split("?")[0];
		}
	
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
			search: {
				paths: 'auto',
			},
			giscus:{
				repo: "LordA2117/vulnerable-machines-writeups",
				repoId: "R_kgDOMN9P_Q",
				category: "Announcements",
				categoryId: "DIC_kwDOMN9P_c4C9AZV",
				mapping: "specific",
				reactionsEnabled: "1",
				strict: "1",
				emitMetadata: "0",
				inputPosition: "bottom",
				theme: "dark",
				lang: "en",
				loading: "lazy"
			},
    }

		window.$docsify.plugins = [].concat(function (hook) {

			hook.doneEach(function () {

				const container = document.querySelector(".giscus");
				if (!container) return;

				container.innerHTML = "";

				const hash = window.location.hash;

				let term = "home";
				if (hash && hash !== "#/") {
					term = hash.replace("#/", "").split("?")[0];
				}

				const script = document.createElement("script");
				script.src = "https://giscus.app/client.js";

				script.setAttribute("data-repo", "LordA2117/vulnerable-machines-writeups");
				script.setAttribute("data-repo-id", "R_kgDOMN9P_Q");
				script.setAttribute("data-category", "Announcements");
				script.setAttribute("data-category-id", "DIC_kwDOMN9P_c4C9AZV");

				script.setAttribute("data-mapping", "specific");
				script.setAttribute("data-term", term);

				script.setAttribute("data-strict", "1");
				script.setAttribute("data-reactions-enabled", "1");
				script.setAttribute("data-input-position", "bottom");
				script.setAttribute("data-theme", "dark");
				script.setAttribute("data-lang", "en");

				script.async = true;

				container.appendChild(script);
			});

		});
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//unpkg.com/docsify-themeable/dist/js/docsify-themeable.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
	<!-- Syntax highlights for languages -->
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-git.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
	<!-- comments -->
	<script src="https://unpkg.com/docsify-giscus@1.0.0/dist/docsify-giscus.min.js"></script>
</body>
</html>
